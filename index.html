<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XYZ Random Distributor (Binomial)</title>
<style>
body {
    font-family: Arial, sans-serif;
}
table {
    border-collapse: collapse;
    margin-top: 20px;
}
th, td {
    border: 1px solid #999;
    padding: 6px 12px;
    text-align: center;
}
</style>
</head>
<body>

<h2>XYZ Random Distributor</h2>

<label>信仰の値を入力:</label>
<input type="number" id="inputA" min="0" value="20">
<button onclick="generate()">実行</button>

<h3>ランダム割り振り結果</h3>
<div id="result"></div>

<h3>Zが◯◯以上になる確率表</h3>
<div id="tableArea"></div>

<script>
function factorial(n) {
    if (n === 0 || n === 1) return 1;
    let result = 1;
    for (let i = 2; i <= n; i++) {
        result *= i;
    }
    return result;
}

function combination(n, k) {
    return factorial(n) / (factorial(k) * factorial(n - k));
}

function generate() {
    const A = parseInt(document.getElementById("inputA").value);
    if (isNaN(A) || A < 0) {
        alert("信仰は0以上の整数を入力してください");
        return;
    }

    // ---- ランダム抽選（1/3ずつ）----
    let X = 0, Y = 0, Z = 0;

    for (let i = 0; i < A; i++) {
        let r = Math.floor(Math.random() * 3);
        if (r === 0) X++;
        else if (r === 1) Y++;
        else Z++;
    }

    document.getElementById("result").innerHTML =
        `X = ${X}, Y = ${Y}, Z = ${Z}`;

    // ---- Z以上の確率----
    let table = "<table><tr><th>Z以上</th><th>確率</th></tr>";

    for (let k = A; k >= 0; k--) {
        let cumulative = 0;

        for (let i = k; i <= A; i++) {
            cumulative += combination(A, i) *
                Math.pow(1/3, i) *
                Math.pow(2/3, A - i);
        }

        let probPercent = (cumulative * 100).toFixed(4) + "%";

        table += `<tr>
                    <td>${k}</td>
                    <td>${probPercent}</td>
                  </tr>`;
    }

    table += "</table>";
    document.getElementById("tableArea").innerHTML = table;
}
</script>

</body>
</html>
