<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XYZ Random Distributor (Binomial)</title>
<style>
body {
    font-family: Arial, sans-serif;
}
.container {
    display: flex;
    gap: 40px;
    margin-top: 20px;
}
table {
    border-collapse: collapse;
}
th, td {
    border: 1px solid #999;
    padding: 6px 12px;
    text-align: center;
}
.highlight {
    background-color: #ffcc00;
    font-weight: bold;
}
</style>
</head>
<body>

<h2>XYZ Random Distributor</h2>

<label>信仰の値を入力:</label>
<input type="number" id="inputA" min="0" value="20">
<button onclick="generate()">実行</button>

<h3>ランダム割り振り結果</h3>
<div id="result"></div>

<div class="container">
    <div>
        <h3>Zが◯◯以上になる確率</h3>
        <div id="cumulativeTable"></div>
    </div>
    <div>
        <h3>Z = ◯◯ になる確率</h3>
        <div id="exactTable"></div>
    </div>
</div>

<script>
function factorial(n) {
    if (n === 0 || n === 1) return 1;
    let result = 1;
    for (let i = 2; i <= n; i++) result *= i;
    return result;
}

function combination(n, k) {
    return factorial(n) / (factorial(k) * factorial(n - k));
}

function generate() {
    const A = parseInt(document.getElementById("inputA").value);
    if (isNaN(A) || A < 0) {
        alert("信仰は0以上の整数を入力してください");
        return;
    }

    // ---- ランダム抽選 ----
    let X = 0, Y = 0, Z = 0;
    for (let i = 0; i < A; i++) {
        let r = Math.floor(Math.random() * 3);
        if (r === 0) X++;
        else if (r === 1) Y++;
        else Z++;
    }

    document.getElementById("result").innerHTML =
        `X = ${X}, Y = ${Y}, Z = ${Z}`;

    let cumulativeHTML = "<table><tr><th>Z以上</th><th>確率</th></tr>";
    let exactHTML = "<table><tr><th>Z</th><th>確率</th></tr>";

    let probabilities = [];
    let maxProb = 0;

    // ---- 各確率計算 ----
    for (let k = 0; k <= A; k++) {
        let prob = combination(A, k) *
            Math.pow(1/3, k) *
            Math.pow(2/3, A - k);

        probabilities.push(prob);
        if (prob > maxProb) maxProb = prob;
    }

    // ---- 累積確率（降順）----
    for (let k = A; k >= 0; k--) {
        let cumulative = 0;
        for (let i = k; i <= A; i++) {
            cumulative += probabilities[i];
        }

        cumulativeHTML += `<tr>
            <td>${k}</td>
            <td>${(cumulative * 100).toFixed(4)}%</td>
        </tr>`;
    }
    cumulativeHTML += "</table>";

    // ---- 正確率（最頻値ハイライト）----
    for (let k = 0; k <= A; k++) {
        let highlight = probabilities[k] === maxProb ? "highlight" : "";

        exactHTML += `<tr class="${highlight}">
            <td>${k}</td>
            <td>${(probabilities[k] * 100).toFixed(4)}%</td>
        </tr>`;
    }
    exactHTML += "</table>";

    document.getElementById("cumulativeTable").innerHTML = cumulativeHTML;
    document.getElementById("exactTable").innerHTML = exactHTML;
}
</script>

</body>
</html>
